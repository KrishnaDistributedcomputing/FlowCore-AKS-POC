name: "Module A-E: Deploy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'poc'
        type: choice
        options: ['poc']

permissions:
  id-token: write
  contents: read

env:
  SUBSCRIPTION_ID: e62428e7-08dd-4bc2-82e2-2c51586d9105
  LOCATION: canadacentral

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          region: ${{ env.LOCATION }}
          template: infra/bicep/main.bicep
          parameters: >
            environment=${{ inputs.environment }}
            projectPrefix=flowcore
            location=${{ env.LOCATION }}
            postgresAdminLogin=${{ secrets.POSTGRES_ADMIN_LOGIN }}
          deploymentName: flowcore-${{ inputs.environment }}-${{ github.run_number }}
          failOnStdErr: false
