# ──────────────────────────────────────────────────
# Network Policies – Architectural Standardization
# Business Outcome Dimension 6
# Default-deny with explicit allow rules
# ──────────────────────────────────────────────────

# ── Default deny all ingress in apps namespace ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: apps
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── Default deny all ingress in workers namespace ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: workers
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── Allow API Gateway → Customer Service ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-customer
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: customer-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              purpose: platform-services
          podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8080
---
