apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: apps
  labels:
    app: reporting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      nodeSelector:
        workload: apps
      containers:
        - name: reporting-service
          image: ${ACR_LOGIN_SERVER}/flowcore/reporting-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__ReportingDb
              valueFrom:
                secretKeyRef:
                  name: flowcore-secrets
                  key: reporting-db-connection
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: flowcore-secrets
                  key: redis-connection
            - name: APPLICATIONINSIGHTS__CONNECTIONSTRING
              valueFrom:
                secretKeyRef:
                  name: flowcore-secrets
                  key: appinsights-connection-string
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: apps
spec:
  selector:
    app: reporting-service
  ports:
    - port: 80
      targetPort: 8080
