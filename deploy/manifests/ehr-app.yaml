apiVersion: apps/v1
kind: Deployment
metadata:
  name: ehr-app
  namespace: apps
  labels:
    app: ehr-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ehr-app
  template:
    metadata:
      labels:
        app: ehr-app
    spec:
      nodeSelector:
        agentpool: apps
      containers:
        - name: ehr-app
          image: ${ACR_LOGIN_SERVER}/flowcore/ehr-app:latest
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__EhrDb
              valueFrom:
                secretKeyRef:
                  name: flowcore-secrets
                  key: ehr-connection-string
            - name: ApplicationInsights__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: flowcore-secrets
                  key: appinsights-connection-string
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ehr-app
  namespace: apps
  labels:
    app: ehr-app
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: ehr-app
